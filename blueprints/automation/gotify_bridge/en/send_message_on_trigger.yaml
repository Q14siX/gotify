blueprint:
  name: Gotify – Send message on trigger
  description: >
    Sends a Gotify message every time this automation is triggered by calling the
    `gotify_bridge.send_message` service. Use it to connect any Home Assistant
    trigger and condition with Gotify, including optional priority, Markdown,
    click URL, intent URL, or a big image URL.
  domain: automation
  source_url: https://raw.githubusercontent.com/Q14siX/gotify/main/blueprints/automation/gotify_bridge/en/send_message_on_trigger.yaml
  input:
    trigger:
      name: Trigger
      description: One or more triggers that start this automation.
      selector:
        trigger:
    conditions:
      name: Additional conditions
      description: Optional conditions that must pass before the message is sent.
      default: []
      selector:
        condition:
    entry_id:
      name: Gotify entry ID
      description: >
        Optional. Only required when multiple Gotify integrations are configured
        and you want to target a specific entry.
      default: ""
      selector:
        text:
    title:
      name: Title
      description: Optional title of the Gotify message.
      default: ""
      selector:
        text:
    message:
      name: Message
      description: Body text of the Gotify message.
      selector:
        text:
          multiline: true
    priority:
      name: Priority
      description: Gotify priority from 0 to 10.
      default: 5
      selector:
        number:
          min: 0
          max: 10
          mode: slider
    markdown:
      name: Enable Markdown
      description: Send the message as Markdown.
      default: false
      selector:
        boolean:
    click_url:
      name: Click URL
      description: Optional URL that is opened when the message is tapped.
      default: ""
      selector:
        text:
    big_image_url:
      name: Big image URL
      description: Optional image URL for clients that support a large image.
      default: ""
      selector:
        text:
    intent_url:
      name: Intent URL
      description: Optional Android intent URL for `onReceive`.
      default: ""
      selector:
        text:

mode: queued
max: 25

triggers: !input trigger
conditions: !input conditions

actions:
  - action: gotify_bridge.send_message
    data:
      entry_id: !input entry_id
      title: !input title
      message: !input message
      priority: !input priority
      markdown: !input markdown
      click_url: !input click_url
      big_image_url: !input big_image_url
      intent_url: !input intent_url
